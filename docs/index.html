<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hệ Thống Quản Lý Tiêm Chủng</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      background: #0b1220;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      background: radial-gradient(ellipse at bottom, #2a303c 0%, #0b1220 100%);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .hero h1 .highlight {
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.2rem;
      color: var(--muted);
      max-width: 600px;
      margin-bottom: 40px;
    }
    .hero-actions {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-large {
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-customer {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      backdrop-filter: blur(10px);
    }
    .btn-customer:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }
    .btn-employee {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
    }
    .btn-employee:hover {
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
      filter: brightness(1.1);
      transform: translateY(-2px);
    }
    .auth-banner {
      position: absolute;
      top: 20px;
      right: 20px;
      display: none;
    }
  </style>
</head>
<body>
  
  <div class="auth-banner" id="authBanner">
    <a href="dashboard.html" class="btn primary">Vào Dashboard</a>
  </div>

  <div class="hero">
    <h1><span class="highlight">Vaccination</span> System</h1>
    <p>Hệ thống hỗ trợ tự động hóa luồng tiêm chủng, từ tra cứu khách hàng đến thanh toán & kho xuất nhập.</p>
    
    <div class="hero-actions">
      <a href="customer-portal.html" class="btn-large btn-customer">Dành cho Khách Hàng</a>
      <a href="login.html" class="btn-large btn-employee">Đăng Nhập Nhân Viên</a>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("session");
        if (raw) {
          var s = JSON.parse(raw);
          if (s && s.success) {
             document.getElementById('authBanner').style.display = 'block';
          }
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
