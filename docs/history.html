<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lịch sử tiêm</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <span class="brand-accent">Vaccination</span>
        <span class="badge">Lịch sử tiêm</span>
      </div>
      <div class="topbar-actions">
        <span class="role-pill" id="headerRole" title="Vai trò">—</span>
        <a href="profile.html" class="header-user" id="headerUserLink">…</a>
        <button class="btn" type="button" onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-role-banner" id="sidebarRoleBanner" aria-live="polite"></div>
        <div class="nav">
          <a id="nav-vaccine" href="vaccines.html">Quản lý vaccine</a>
          <a id="nav-forms" href="vaccination-forms.html">Tạo phiếu tiêm</a>
          <a id="nav-payment" href="payment.html">Thanh toán</a>
          <a id="nav-statistics" href="statistics.html">Thống kê</a>
          <a id="nav-history" href="history.html">Lịch sử tiêm</a>
          <a id="nav-account" href="account.html">Quản lý tài khoản</a>
        </div>
      </aside>

      <main class="content">
        <div class="card">
          <h2 style="margin:0 0 10px;">Lịch sử tiêm (dựa trên phiếu tiêm)</h2>
          <div class="row">
            <div class="field" style="min-width:140px;">
              <label for="searchField">Trường tìm kiếm</label>
              <select id="searchField">
                <option value="all">Tất cả</option>
                <option value="vaccinationFormId">Mã Phiếu</option>
                <option value="customerName">Khách Hàng</option>
                <option value="vaccinationDate">Ngày Tiêm</option>
              </select>
            </div>
            <div class="field" style="flex:1;min-width:260px;">
              <label for="keyword">Nội dung tìm kiếm</label>
              <input id="keyword" placeholder="Nhập từ khóa để lọc..." />
            </div>
            <div style="align-self:flex-end;">
              <button class="btn primary" onclick="renderHistoryTable()">Tìm kiếm</button>
            </div>
          </div>
          <div class="hint" style="margin-bottom:12px;margin-top:10px;">
            Endpoint hiện tại dùng chung với `/api/vaccination-forms`.
          </div>
          <div style="overflow:auto;max-height:360px;">
            <table>
              <thead>
              <tr>
                <th>Form ID</th>
                <th>Khách hàng</th>
                <th>Ngày tiêm</th>
                <th>Chi tiết</th>
              </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    initPage();

    let allHistoryData = [];

    async function loadHistory(){
      allHistoryData = await apiRequest("/api/vaccination-forms");
      renderHistoryTable();
    }

    function renderHistoryTable() {
      const field = document.getElementById("searchField").value;
      const kw = document.getElementById("keyword").value.toLowerCase().trim();
      const body = document.getElementById("historyBody");
      body.innerHTML = "";

      const filtered = allHistoryData.filter(f => {
         if (field === "all") {
            return (f.vaccinationFormId?.toLowerCase().includes(kw)) ||
                   (f.customerName?.toLowerCase().includes(kw)) ||
                   (f.vaccinationDate?.toLowerCase().includes(kw));
         } else {
            const val = f[field] ? String(f[field]).toLowerCase() : "";
            return val.includes(kw);
         }
      });

      for (const f of filtered){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${f.vaccinationFormId}</td>
          <td>${f.customerName ?? ""}</td>
          <td>${f.vaccinationDate ?? ""}</td>
          <td><button class="btn" type="button" onclick="showFormVaccines('${f.vaccinationFormId}')">Xem</button></td>
        `;
        body.appendChild(tr);
      }
    }

    async function showFormVaccines(formId){
      const vaccines = await apiRequest(`/api/vaccination-forms/${formId}/vaccines`);
      const lines = vaccines.map(v => `${v.vaccineName} (cnt=${v.cnt}, dose=${v.dose}, retention=${v.retentionDate})`).join("\n");
      alert(`Form: ${formId}\n${lines}`);
    }

    loadHistory().catch(err => alert(err.message));
  </script>
</body>
</html>
