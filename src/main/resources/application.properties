# Application configuration
app.password.hash-enabled=false

# DataSource configuration
# Note: Railway often provides MYSQL_URL. DatabaseConfig.java handles parsing it.
# If not using MYSQL_URL, uncomment and ensure environment variables match Railway dashboard.
# spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=${MYSQLUSER}
# spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Port configuration for Railway
server.port=${PORT:8080}

# Logging
logging.level.org.springframework.jdbc.core=DEBUG